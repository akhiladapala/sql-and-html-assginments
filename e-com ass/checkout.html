<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ebay | Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <a href="home.html">Home</a>
        <a href="products.html">Products</a>
        <a href="checkout.html">Checkout</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="container">
        <h2>Checkout Form</h2>
        <form id="checkoutForm">
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" id="fullName" placeholder="Enter full name">
                <span class="error-msg" id="nameError">Name is required.</span>
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="text" id="email" placeholder="Enter email">
                <span class="error-msg" id="emailError">Please enter a valid email format.</span>
            </div>

            <div class="form-group">
                <label>Phone Number:</label>
                <input type="text" id="phone" placeholder="10-digit number">
                <span class="error-msg" id="phoneError">Phone must be exactly 10 digits.</span>
            </div>

            <div class="form-group">
                <label>Address:</label>
                <input type="text" id="address" placeholder="Enter address">
                <span class="error-msg" id="addressError">Address is required.</span>
            </div>

            <div class="form-group">
                <label>City:</label>
                <input type="text" id="city" placeholder="Enter city">
                <span class="error-msg" id="cityError">City is required.</span>
            </div>

            <div class="form-group">
                <label>PIN Code:</label>
                <input type="text" id="pin" placeholder="6-digit PIN">
                <span class="error-msg" id="pinError">PIN must be exactly 6 digits.</span>
            </div>

            <div class="form-group">
                <label>Payment Method:</label>
                <input type="radio" name="payment" value="Credit Card" checked> Credit Card
                <input type="radio" name="payment" value="Debit Card"> Debit Card
                <input type="radio" name="payment" value="Cash on Delivery"> Cash on Delivery
            </div>

            <div class="form-group">
                <input type="checkbox" id="terms">
                <label style="display:inline;">I agree to the Terms & Conditions</label>
                <span class="error-msg" id="termsError"><br>You must agree to the terms.</span>
            </div>

            <button type="submit">Place Order</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
